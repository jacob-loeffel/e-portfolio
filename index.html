<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacob Loeffel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/36f4694022.js" crossorigin="anonymous"></script>
</head>
<body>
  <section id="aboutme">
    <nav>
      <div class="personal__logo">Jacob Loeffel</div>
      <ul class="nav__link--list">
        <li>
          <a href="" class="
          nav__link--anchor
          link__hover-effect
          link__hover-effect--black"
          >Languages</a>
        </li>
        <li>
          <a href="" class="
          nav__link--anchor
          link__hover-effect
          link__hover-effect--black"
          >Projects</a>
        </li>
        <li>
          <a href="" class="
          nav__link--anchor
          nav__link--anchor-primary"
          >Contact</a>
        </li>
      </ul>
    </nav>
    <div class="flex flex-1">
      <div class="about-me__info row">
        <div class="about-me__info--container">
          <figure class="about-me__picture--mask">
            <img src="./assets/profile-picture.jpg" class="about-me__picture" alt="Picture of Me">
          </figure>
          <h1 class="aboout-me__info--title">
            Hey! I'm <span class="text--purple">Jacob Loeffel</span>
          </h1>
          <p>
            I'm a <strong class="text--purple">frontend software developer</strong> with a strong passion for helping people and building user-friendly web applications that can make a difference in their lives.
          </p>
          <div class="about-me__links">
            <a href="" class="about-me__link">
              <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a href="" class="about-me__link">
              <i class="fa-brands fa-github"></i>
            </a>
            <a href="" class="about-me__link">
              <i class="fa-regular fa-envelope"></i>
            </a>
            <a href="" class="about-me__link">
              <i class="fa-regular fa-file"></i>
            </a>
          </div>
        </div>
        <figure class="about-me__img--container">
          <img src="./assets/undraw_websites.svg" class="about-me__img" alt="">
        </figure>
      </div>
    </div>
  </section>
  <section id="languages">
    <div class="container">
      <div class="row">
        <h1 class="section__title">This is my <span class="text--purple">technology stack</span></h1>
        <div class="language__list">
          <div class="language">
            <figure class="language__img--wrapper">
              <img src="./assets/HTML5_Badge.svg" alt="" class="language__img">
            </figure>
            <span class="language__name">HTML</span>
          </div>
          <div class="language">
            <figure class="language__img--wrapper">
              <img src="./assets/HTML5_Badge.svg" alt="" class="language__img">
            </figure>
            <span class="language__name">HTML</span>
          </div>
          <div class="language">
            <figure class="language__img--wrapper">
              <img src="./assets/HTML5_Badge.svg" alt="" class="language__img">
            </figure>
            <span class="language__name">HTML</span>
          </div>
          <div class="language">
            <figure class="language__img--wrapper">
              <img src="./assets/HTML5_Badge.svg" alt="" class="language__img">
            </figure>
            <span class="language__name">HTML</span>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
